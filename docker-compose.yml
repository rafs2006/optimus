# Self-host stack for optimus: the six bot services plus their backing stores
# (PostgreSQL, Redis, NATS/JetStream). Configuration comes from a local `.env`
# (copy `.env.example`); at minimum set OPTIMUS_DISCORD_TOKEN before `up`.
#
#   cp .env.example .env   # then edit OPTIMUS_DISCORD_TOKEN
#   docker compose up --build
#
# The `migrate` service applies Alembic migrations once and exits; every bot
# service waits for it to finish and for the datastores to report healthy.

x-optimus-image: &optimus-image
  build:
    context: .
    dockerfile: Dockerfile
  image: optimus:local

x-optimus-env: &optimus-env
  # In-cluster datastore URLs override the localhost defaults from .env.example.
  OPTIMUS_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-optimus}:${POSTGRES_PASSWORD:-optimus}@postgres:5432/${POSTGRES_DB:-optimus}
  OPTIMUS_REDIS_URL: redis://redis:6379/0
  OPTIMUS_NATS_URL: nats://nats:4222

x-optimus-service: &optimus-service
  <<: *optimus-image
  restart: unless-stopped
  env_file: .env
  environment: *optimus-env
  # /readyz turns 200 only once NATS/Redis/Postgres dependencies answer.
  healthcheck:
    test: ["CMD", "curl", "-fsS", "http://localhost:8080/readyz"]
    interval: 15s
    timeout: 5s
    retries: 5
    start_period: 30s
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    nats:
      condition: service_healthy
    migrate:
      condition: service_completed_successfully

services:
  # ---- Backing stores ------------------------------------------------------
  postgres:
    image: postgres:16.4-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-optimus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-optimus}
      POSTGRES_DB: ${POSTGRES_DB:-optimus}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-optimus} -d ${POSTGRES_DB:-optimus}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7.4-bookworm
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    # JetStream is required (bounded streams + pull consumers); -m exposes the
    # monitoring port used by the healthcheck. --max_payload is raised well
    # above the NATS 1 MiB default because images ride inline as base64 in
    # image_fetched events: a raw image up to OPTIMUS_INGEST_MAX_INLINE_BYTES
    # (default 8 MiB) inflates ~4/3 plus a JSON envelope, so the server must
    # accept ~11 MiB. 12 MiB leaves headroom. The ingest service validates the
    # configured inline cap against this negotiated limit at startup and fails
    # fast if it is too small, so a mismatch can never silently drop images.
    command: ["-js", "-sd", "/data", "-m", "8222", "--max_payload", "12582912"]
    volumes:
      - nats-data:/data
    healthcheck:
      # The monitoring /healthz endpoint reports JetStream readiness too.
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ---- One-shot schema migration ------------------------------------------
  migrate:
    <<: *optimus-image
    restart: "no"
    env_file: .env
    environment: *optimus-env
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy

  # ---- optimus services ----------------------------------------------------
  gateway:
    <<: *optimus-service
    command: ["python", "-m", "optimus.services.gateway"]

  ingest:
    <<: *optimus-service
    command: ["python", "-m", "optimus.services.ingest"]

  detection:
    <<: *optimus-service
    command: ["python", "-m", "optimus.services.detection"]

  moderation:
    <<: *optimus-service
    command: ["python", "-m", "optimus.services.moderation"]

  interactions:
    <<: *optimus-service
    command: ["python", "-m", "optimus.services.interactions"]

  scheduler:
    <<: *optimus-service
    command: ["python", "-m", "optimus.services.scheduler"]

  # ---- Optional monitoring stack -------------------------------------------
  # Opt-in only: these services carry `profiles: [monitoring]`, so a plain
  # `docker compose up` does NOT start them. Bring them up with:
  #
  #   docker compose --profile monitoring up -d prometheus grafana
  #
  # Prometheus scrapes all six services on the shared compose network and
  # evaluates the alert rules in monitoring/alerts.yml. Grafana is provisioned
  # with the Prometheus datasource and the Optimus overview dashboard.
  prometheus:
    image: prom/prometheus:v2.54.1
    profiles: [monitoring]
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  grafana:
    image: grafana/grafana:11.2.0
    profiles: [monitoring]
    restart: unless-stopped
    environment:
      # Local self-host defaults; change the admin password for any real use.
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
  nats-data:
  prometheus-data:
  grafana-data:
