# Pre-commit hooks mirror the checks CI runs (.github/workflows/ci.yml):
# ruff lint (check-only, no autofix), mypy strict on src, plus basic hygiene.
# Run on the whole tree with: uvx pre-commit run --all-files
#
# Note: `ruff format` is intentionally NOT enabled. CI only runs `ruff check`,
# and the tree is not ruff-format-clean, so a formatting hook would rewrite
# files the project does not currently format. Keep this in sync with CI.
default_install_hook_types: [pre-commit]
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=600]

  # Ruff and mypy run through the project's uv environment (local hooks) rather
  # than pinned mirror repos. This guarantees the exact same tool versions and
  # config the CI job uses (`uv run ruff check .` / `uv run mypy`), so a green
  # `pre-commit run --all-files` means a green CI lint+type stage. A pinned
  # ruff-pre-commit mirror would drift from the uv-resolved ruff and flag
  # version-specific noqa differences that CI does not see.
  - repo: local
    hooks:
      - id: ruff
        name: ruff check (uv)
        # No --fix: report, don't silently rewrite, so local == CI.
        entry: uv run ruff check
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: mypy
        name: mypy (strict, uv)
        entry: uv run mypy
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
